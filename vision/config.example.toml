# Copy to config.toml and adjust for your camera. All coordinates are in pixels of
# the camera image, with (0, 0) at the top-left.

[source]
# kind = "file"   -> target is a path to a recorded video (best for first tests)
# kind = "webcam" -> target is a camera index, e.g. "0"
# kind = "stream" -> target is an ESP32-CAM / RTSP URL, e.g. "http://192.168.1.50:81/stream"
kind = "file"
target = "data/door.mp4"

[doorway]
# The threshold line drawn across the doorway, as two endpoints [x, y].
# A person's foot point crossing this line counts as entering or leaving.
line_a = [100, 360]
line_b = [540, 360]
# Which side of the line is inside the office: "left" or "right" of the a -> b direction.
inside_side = "left"

[thresholds]
detection_conf = 0.4    # minimum YOLO confidence to treat a detection as a person
face_match = 0.35       # minimum cosine similarity to accept a face as a known person
face_clarity_min = 0.5  # face clarity "good enough" to lock identity early (0..1)
exit_similarity = 0.6   # minimum cosine similarity to link an exit to an occupant
exit_margin = 0.05      # winner must beat the runner-up by this, else exit is ambiguous
min_track_age = 3       # frames a track must exist before its crossing counts (anti-flicker)

[paths]
gallery_dir = "gallery"
database = "data/occupancy.db"
